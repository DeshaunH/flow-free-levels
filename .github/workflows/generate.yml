name: Flow Free Level Pipeline

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'scripts/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  generate-and-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Generate Levels
        run: |
          TIMESTAMP=$(TZ='Asia/Tokyo' date +'%Y%m%d%H%M')
          DIR_NAME="levels_$TIMESTAMP"
          echo "DIR_NAME=$DIR_NAME" >> $GITHUB_ENV
          LEVELS_DIR=$DIR_NAME npm run generate

      - name: Commit Generated Levels
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ${{ env.DIR_NAME }}/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-generate 100 progressive levels (${{ env.DIR_NAME }})" && git push)